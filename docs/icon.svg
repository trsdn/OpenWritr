<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1923"/>
      <stop offset="50%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#071020"/>
    </linearGradient>
    <linearGradient id="mic-grad" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#5ee0ff"/>
      <stop offset="100%" stop-color="#2ba8d4"/>
    </linearGradient>
    <linearGradient id="wave-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3ecfff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#3ecfff" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="pen-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#e84545"/>
    </linearGradient>
    <filter id="glow-icon">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="inner-shadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feOffset dx="0" dy="2" result="offset"/>
      <feComposite in2="SourceAlpha" operator="arithmetic" k2="-1" k3="1" result="shadow"/>
      <feFlood flood-color="#000" flood-opacity="0.25" result="color"/>
      <feComposite in="color" in2="shadow" operator="in"/>
      <feMerge>
        <feMergeNode in="SourceGraphic"/>
        <feMergeNode/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#bg-grad)"/>

  <!-- Subtle border -->
  <rect width="512" height="512" rx="112" fill="none" stroke="#1e2a3a" stroke-width="1.5"/>

  <!-- Ambient glow behind mic -->
  <ellipse cx="230" cy="220" rx="100" ry="120" fill="#3ecfff" opacity="0.06"/>

  <!-- Sound waves (right side) -->
  <g stroke="url(#wave-grad)" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.5">
    <path d="M 300 190 Q 330 220, 300 260" opacity="0.7"/>
    <path d="M 320 170 Q 365 225, 320 280" opacity="0.5"/>
    <path d="M 340 150 Q 400 225, 340 300" opacity="0.3"/>
  </g>

  <!-- Microphone body -->
  <g filter="inner-shadow">
    <rect x="190" y="120" width="80" height="140" rx="40" fill="url(#mic-grad)"/>
  </g>

  <!-- Mic grille lines -->
  <g stroke="#0a1628" stroke-width="1.5" opacity="0.2">
    <line x1="200" y1="155" x2="260" y2="155"/>
    <line x1="200" y1="170" x2="260" y2="170"/>
    <line x1="200" y1="185" x2="260" y2="185"/>
    <line x1="200" y1="200" x2="260" y2="200"/>
    <line x1="200" y1="215" x2="260" y2="215"/>
  </g>

  <!-- Mic highlight -->
  <rect x="205" y="128" width="20" height="60" rx="10" fill="#fff" opacity="0.12"/>

  <!-- Mic pickup arc -->
  <path d="M 170 250 Q 170 320, 230 320 Q 290 320, 290 250"
        stroke="url(#mic-grad)" stroke-width="7" stroke-linecap="round" fill="none" opacity="0.8"/>

  <!-- Mic stand -->
  <line x1="230" y1="320" x2="230" y2="370" stroke="url(#mic-grad)" stroke-width="7" stroke-linecap="round" opacity="0.8"/>

  <!-- Pen/cursor element (bottom right) — represents writing -->
  <g transform="translate(290, 310) rotate(-45)">
    <rect x="0" y="0" width="12" height="70" rx="3" fill="url(#pen-grad)" filter="glow-icon"/>
    <polygon points="2,70 10,70 6,84" fill="url(#pen-grad)"/>
    <!-- Pen highlight -->
    <rect x="2" y="5" width="4" height="30" rx="2" fill="#fff" opacity="0.2"/>
  </g>

  <!-- Text lines (bottom, representing transcribed text) -->
  <g opacity="0.35">
    <rect x="130" y="395" width="160" height="5" rx="2.5" fill="#3ecfff"/>
    <rect x="130" y="412" width="120" height="5" rx="2.5" fill="#3ecfff"/>
    <rect x="130" y="429" width="140" height="5" rx="2.5" fill="#3ecfff"/>
  </g>
</svg>
