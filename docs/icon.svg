<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111a2e"/>
      <stop offset="100%" stop-color="#070d1a"/>
    </linearGradient>
    <linearGradient id="mic" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#6ee7ff"/>
      <stop offset="100%" stop-color="#2bb8e0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Microphone body -->
  <rect x="196" y="100" width="120" height="180" rx="60" fill="url(#mic)"/>
  <!-- Highlight -->
  <rect x="216" y="118" width="24" height="72" rx="12" fill="#fff" opacity="0.18"/>

  <!-- Mic arc -->
  <path d="M 156 270 Q 156 360, 256 360 Q 356 360, 356 270"
        stroke="url(#mic)" stroke-width="10" stroke-linecap="round" fill="none" opacity="0.7"/>

  <!-- Stand -->
  <line x1="256" y1="360" x2="256" y2="400" stroke="url(#mic)" stroke-width="10" stroke-linecap="round" opacity="0.7"/>

  <!-- Text lines -->
  <rect x="168" y="424" width="176" height="6" rx="3" fill="#3ecfff" opacity="0.5"/>
  <rect x="192" y="444" width="128" height="6" rx="3" fill="#3ecfff" opacity="0.3"/>
</svg>
